<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Riovic Matthew Susas | Associate Amazon PPC Specialist</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&family=Fjalla+One&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --amazon-orange: #FF9900;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        html {
            scroll-behavior: smooth;
            scroll-padding-top: 90px;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #0b0b0b;
            color: #ffffff;
            line-height: 1.6;
            padding-top: 70px;
        }

        a {
            color: #ffffff;
            text-decoration: none;
        }

        section {
            padding: 80px 10%;
        }

        h1,
        h2,
        h3 {
            font-weight: 700;
        }

        strong {
            color: var(--amazon-orange);
        }

        p {
            color: #cfcfcf;
            max-width: 700px;
        }

        /* NAVBAR */
        .navbar {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 70px;
            background: rgba(0, 0, 0, 0.9);
            backdrop-filter: blur(8px);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 30px;
            z-index: 1000;
            border-bottom: 1px solid #222;
        }

        .nav-time {
            font-size: 0.75rem;
            color: #cfcfcf;
            display: flex;
            flex-direction: column;
            line-height: 1.2;
        }

        .nav-name {
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
            font-weight: 600;
            letter-spacing: 1px;
            cursor: pointer;
            text-align: center;
        }

        .nav-name .default-text {
            display: block;
        }

        .nav-name .hover-text {
            display: none;
            color: #fff;
            text-decoration: underline;
            font-size: 0.9rem;
        }

        .nav-name:hover .default-text {
            display: none;
        }

        .nav-name:hover .hover-text {
            display: block;
        }

        .hamburger {
            width: 24px;
            cursor: pointer;
        }

        .hamburger span {
            display: block;
            height: 2px;
            background: #fff;
            margin: 5px 0;
        }

        .dropdown {
            position: absolute;
            top: 70px;
            right: 30px;
            /* Default for desktop */
            background: #111;
            border: 1px solid #222;
            border-radius: 10px;
            display: none;
            z-index: 1001;
        }

        .dropdown a {
            display: block;
            padding: 12px 18px;
            font-size: 0.9rem;
            color: #cfcfcf;
        }

        .dropdown a.active {
            background: #1c1c1c;
            color: #fff;
        }

        .dropdown a:hover {
            background: #1c1c1c;
        }

        /* HERO */
        .hero {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            background: linear-gradient(180deg, #000000, #0f0f0f);
        }

        .hero h1 {
            font-family: 'Fjalla One', sans-serif;
            font-size: 6rem;
            margin-bottom: 10px;
        }

        .hero h3 {
            font-family: 'Fjalla One', sans-serif;
            font-size: 3rem;
            font-weight: 400;
            color: #bfbfbf;
        }

        /* SECTION TITLE */
        .section-title {
            margin-bottom: 30px;
        }

        .divider {
            width: 60px;
            height: 3px;
            background: var(--amazon-orange);
            margin-top: 10px;
            box-shadow: 0 0 10px rgba(255, 153, 0, 0.5);
        }

        /* GRID & CARDS */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 30px;
        }

        .card {
            background: #141414;
            padding: 25px;
            border-radius: 14px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: 0.35s ease;
            position: relative;
        }

        /* Strategy Cards Hover */
        #strategy .card:hover {
            background: var(--amazon-orange);
            transform: translateY(-5px);
        }

        #strategy .card:hover h3,
        #strategy .card:hover p {
            color: #000;
        }

        /* SCROLL ANIMATION */
        .reveal {
            opacity: 0;
            transform: translateY(40px);
            transition: 0.7s ease;
        }

        .reveal.active {
            opacity: 1;
            transform: translateY(0);
        }

        /* CERT CARD */
        .cert-card:hover {
            box-shadow: 0 0 25px rgba(255, 255, 255, 0.15);
            transform: translateY(-6px);
        }

        .view-indicator {
            position: absolute;
            bottom: 18px;
            right: 22px;
            font-size: 0.85rem;
            opacity: 0;
            color: #aaa;
            transition: 0.3s ease;
        }

        .cert-card:hover .view-indicator {
            opacity: 1;
        }

        /* TOOL CARD */
        .tool-card:hover {
            transform: translateY(-8px) scale(1.02);
            background: #1a1a1a;
            box-shadow: 0 20px 45px rgba(0, 0, 0, 0.6);
        }

        /* FEATURED CASE */
        .featured {
            border: 1px solid #333;
            background: linear-gradient(180deg, #141414, #0f0f0f);
            margin-bottom: 40px;
        }

        .case-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 40px;
        }

        .case-card {
            background: #141414;
            border-radius: 20px;
            padding: 30px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .case-card:hover {
            transform: translateY(-10px);
            border-color: var(--amazon-orange);
            box-shadow: 0 20px 40px rgba(255, 153, 0, 0.1);
        }

        .case-card h3 {
            font-family: 'Fjalla One', sans-serif;
            font-size: 1.8rem;
            margin-bottom: 15px;
            color: #fff;
        }

        .case-tag {
            display: inline-block;
            padding: 4px 12px;
            background: rgba(255, 153, 0, 0.1);
            color: var(--amazon-orange);
            border-radius: 50px;
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
            margin-bottom: 15px;
        }

        .view-strategy-btn {
            margin-top: 25px;
            padding: 10px 20px;
            background: transparent;
            border: 1px solid #444;
            color: #aaa;
            border-radius: 8px;
            font-size: 0.9rem;
            cursor: pointer;
            transition: 0.3s;
            text-align: center;
        }

        .case-card:hover .view-strategy-btn {
            background: var(--amazon-orange);
            color: #000;
            border-color: var(--amazon-orange);
        }

        /* MODAL */
        .modal {
            position: fixed;
            background: rgba(0, 0, 0, 0.85);
            display: none;
            /* controlled by JS for flex */
            z-index: 2000;
            /* Animation defaults */
            transition: all 0.4s cubic-bezier(0.19, 1, 0.22, 1);
            border-radius: 12px;
            overflow: hidden;
        }

        /* When active (expanded) */
        .modal.active-state {
            inset: 0 !important;
            width: 100% !important;
            height: 100% !important;
            border-radius: 0;
            display: flex !important;
            align-items: center;
            justify-content: center;
        }

        /* KPI CARD */
        .kpi-card {
            background: #1a1a1a;
            padding: 20px;
            border-radius: 10px;
            text-align: center;
            transition: 0.3s ease;
            cursor: default;
            position: relative;
            overflow: hidden;
            border: 1px solid #333;
        }

        .kpi-card:hover {
            transform: translateY(-5px);
            border-color: #fff;
            background: #222;
        }

        .kpi-card h3 {
            font-size: 2rem;
            margin-bottom: 5px;
            transition: 0.3s;
        }

        .kpi-card p {
            font-size: 0.9rem;
            color: #aaa;
            opacity: 0;
            transform: translateY(10px);
            transition: 0.3s;
            position: absolute;
            bottom: 20px;
            left: 0;
            width: 100%;
        }

        .kpi-card:hover h3 {
            transform: translateY(-15px);
            color: #fff;
        }

        .kpi-card:hover p {
            opacity: 1;
            transform: translateY(0);
        }

        /* ROADMAP & WORKFLOW */
        .roadmap-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 25px;
            margin-bottom: 50px;
        }

        .roadmap-card {
            background: #1a1a1a;
            padding: 30px;
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: 0.3s;
            position: relative;
            overflow: hidden;
        }

        .roadmap-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 4px;
            background: var(--amazon-orange);
            opacity: 0.5;
        }

        .roadmap-card:hover {
            transform: translateY(-5px);
            background: #222;
            border-color: var(--amazon-orange);
        }

        .roadmap-card h3 {
            font-size: 1.5rem;
            margin-bottom: 15px;
            color: #fff;
        }

        .roadmap-card ul {
            list-style: none;
            padding: 0;
        }

        .roadmap-card li {
            margin-bottom: 12px;
            font-size: 0.95rem;
            color: #cfcfcf;
            padding-left: 20px;
            position: relative;
        }

        .roadmap-card li::before {
            content: '•';
            color: var(--amazon-orange);
            position: absolute;
            left: 0;
            font-weight: bold;
        }

        .roadmap-card strong {
            color: var(--amazon-orange);
            display: block;
            margin-bottom: 2px;
        }

        /* IMPACT TABLE */
        .impact-table-container {
            background: #141414;
            border-radius: 12px;
            padding: 30px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            margin-top: 40px;
            overflow-x: auto;
            /* Allow horizontal scroll on mobile */
        }

        .impact-table {
            width: 100%;
            border-collapse: collapse;
            text-align: left;
        }

        .impact-table th {
            color: #888;
            font-weight: 400;
            padding: 15px;
            border-bottom: 1px solid #333;
            text-transform: uppercase;
            font-size: 0.85rem;
            letter-spacing: 1px;
        }

        .impact-table td {
            padding: 20px 15px;
            color: #ccc;
            border-bottom: 1px solid #222;
        }

        .impact-table tr:last-child td {
            border-bottom: none;
        }

        .impact-val {
            font-family: 'Fjalla One', sans-serif;
            font-size: 1.25rem;
            color: var(--amazon-orange);
        }

        /* WORKFLOW */
        .workflow-container {
            display: flex;
            align-items: center;
            justify-content: center;
            flex-wrap: wrap;
            gap: 20px;
            margin-top: 40px;
        }

        .workflow-step {
            background: #1a1a1a;
            padding: 20px;
            border-radius: 12px;
            text-align: center;
            width: 160px;
            position: relative;
            border: 1px solid #333;
            transition: 0.3s;
        }

        .workflow-step:hover {
            border-color: #4ade80;
            transform: translateY(-5px);
            box-shadow: 0 5px 20px rgba(74, 222, 128, 0.2);
        }

        .workflow-icon {
            font-size: 2rem;
            margin-bottom: 10px;
            color: #4ade80;
        }

        .workflow-arrow {
            font-size: 1.5rem;
            color: #555;
        }

        @media (max-width: 768px) {
            .workflow-arrow {
                transform: rotate(90deg);
                margin: 10px 0;
            }

            .workflow-container {
                flex-direction: column;
            }
        }
